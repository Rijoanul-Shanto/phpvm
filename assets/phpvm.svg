<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PHP Elephant (elePHPant) -->

  <!-- Ear (behind head) -->
  <path d="M 36 6 C 52 3 57 20 48 28 C 43 33 34 29 32 22 C 30 15 28 9 36 6 Z"
        fill="#727FAF"/>

  <!-- Body -->
  <ellipse cx="38" cy="43" rx="21" ry="15" fill="#8892BF"/>

  <!-- Head -->
  <circle cx="20" cy="28" r="17" fill="#8892BF"/>

  <!-- Trunk -->
  <path d="M 5 34 C -1 43 0 54 6 58 C 11 62 17 58 16 51 C 15 45 11 38 16 34"
        fill="#8892BF"/>

  <!-- Eye white -->
  <circle cx="13" cy="23" r="4.5" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="13" cy="23" r="2.5" fill="#3a4882"/>
  <!-- Eye highlight -->
  <circle cx="14" cy="22" r="1" fill="white"/>

  <!-- Legs -->
  <rect x="19" y="55" width="9" height="8" rx="4" fill="#727FAF"/>
  <rect x="31" y="57" width="9" height="7" rx="3.5" fill="#727FAF"/>
  <rect x="43" y="56" width="9" height="8" rx="4" fill="#727FAF"/>
  <rect x="53" y="54" width="8" height="9" rx="4" fill="#727FAF"/>

  <!-- Tail -->
  <path d="M 58 38 Q 65 28 58 18" stroke="#727FAF" stroke-width="3.5"
        fill="none" stroke-linecap="round"/>
</svg>
